<h1>Clientes</h1>

<!-- FORM SIMPLE -->
<input [(ngModel)]="nombre" placeholder="Nombre" />

<select [(ngModel)]="estado">
  <option value="Activo">Activo</option>
  <option value="Baja">Baja</option>
</select>

<button (click)="guardar()">
  {{ editandoId ? 'Actualizar' : 'Crear' }}
</button>

<button (click)="limpiar()">Cancelar</button>

<hr />

<!-- LISTA -->
<table border="1" width="100%">
  <tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Estado</th>
    <th>Acciones</th>
  </tr>

  <tr *ngFor="let c of clientes">
    <td>{{ c.id }}</td>
    <td>{{ c.nombre }}</td>
    <td>{{ c.estado }}</td>
    <td>
      <button (click)="editar(c)">Editar</button>
      <button (click)="darBaja(c.id)">Dar baja</button>
    </td>
  </tr>
</table>
