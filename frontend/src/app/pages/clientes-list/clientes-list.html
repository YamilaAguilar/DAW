<app-template>
  <div class="acciones-superiores">
    <p-button
      icon="pi pi-arrow-left"
      label="Volver"
      styleClass="p-button-text"
      (click)="volver()"
    ></p-button>

    <p-button
      icon="pi pi-plus"
      label="Crear cliente"
      (click)="mostrarDialog()"
    ></p-button>
  </div>

  <p-table
    [value]="clientes"
    [tableStyle]="{ 'min-width': '50rem' }"
    [scrollable]="true"
    scrollHeight="70vh"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Estado</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-c>
      <tr>
        <td>{{ c.nombre }}</td>
        <td>{{ c.estado }}</td>
        <td>{{ c.telefono }}</td>
        <td>{{ c.email }}</td>

        <td>
          <p-button
            icon="pi pi-pencil"
            pTooltip="Editar"
            (click)="editar(c)"
          ></p-button>

          <p-button
            icon="pi pi-ban"
            pTooltip="Dar baja"
            styleClass="p-button-danger"
            (click)="darBaja(c.id)"
          ></p-button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5">No se encontraron clientes.</td>
      </tr>
    </ng-template>
  </p-table>
</app-template>

<p-dialog
  header="Cliente"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '30rem' }"
>
  <div
    style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;"
  >
    <input pInputText [(ngModel)]="nombre" placeholder="Nombre" />

    <div class="error" *ngIf="mostrarErrorNombre">
      El nombre es obligatorio
    </div>

    <select [(ngModel)]="estado" class="p-inputtext" style="width: 100%">
      <option value="Activo">Activo</option>
      <option value="Baja">Baja</option>
    </select>

    <input pInputText [(ngModel)]="telefono" placeholder="Teléfono" />

    <input pInputText [(ngModel)]="email" placeholder="Email" />
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      styleClass="p-button-text"
      (click)="limpiar()"
    ></p-button>

    <p-button
      [label]="editandoId ? 'Actualizar' : 'Crear'"
      (click)="guardar()"
    ></p-button>
  </ng-template>
</p-dialog>
