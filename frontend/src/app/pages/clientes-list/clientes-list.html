<div class="contenedor">
  <h1>Clientes</h1>

  <!-- FORM SIMPLE -->
  <input [(ngModel)]="nombre" placeholder="Nombre" />

  <input
    [(ngModel)]="email"
    type="email"
    placeholder="Email"
  />

  <input
    [(ngModel)]="telefono"
    placeholder="Teléfono"
  />

  <select [(ngModel)]="estado">
    <option value="Activo">Activo</option>
    <option value="Baja">Baja</option>
  </select>

  <button (click)="guardar()">
    {{ editandoId ? 'Actualizar' : 'Crear' }}
  </button>

  <button (click)="limpiar()">Cancelar</button>

  <hr />

  <!-- LISTA -->
  <table>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>Teléfono</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>

    <tr *ngFor="let c of clientes">
      <td>{{ c.id }}</td>
      <td>{{ c.nombre }}</td>
      <td>{{ c.email }}</td>
      <td>{{ c.telefono }}</td>

      <td>
        <span
          class="estado"
          [class.activo]="c.estado === 'Activo'"
          [class.baja]="c.estado === 'Baja'"
        >
          {{ c.estado }}
        </span>
      </td>

      <td>
        <button class="btn-editar" (click)="editar(c)">
          Editar
        </button>

        <button class="btn-baja" (click)="darBaja(c.id)">
          Dar baja
        </button>
      </td>
    </tr>
  </table>
</div>
