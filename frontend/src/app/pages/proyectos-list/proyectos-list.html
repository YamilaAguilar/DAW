 <app-template>
  <div class="acciones-superiores">

    <p-button
      id="boton-crear-proyecto"
      icon="pi pi-plus"
      label="Crear Proyecto"
      (click)="crearProyecto()"
    ></p-button>


    <p-button
      id="boton-ver-estadisticas"
      icon="pi pi-chart-bar"
      label="Ver estadísticas"
      styleClass="p-button-secondary"
      (click)="irAEstadisticas()"
    ></p-button>

  </div>


  <!-- FILTROS DE FERNANDO -->
  <div class="filtros">

    <label>Estado:</label>

    <select [(ngModel)]="filtroEstado">

      <option value="">Todos</option>
      <option value="Activo">Activo</option>
      <option value="Finalizado">Finalizado</option>
      <option value="Baja">Baja</option>

    </select>


    <label>Cliente:</label>

    <select [(ngModel)]="filtroCliente">

      <option value="">
        Todos
      </option>

      @for(c of clientes; track c.id){

        <option [value]="c.id">
          {{c.nombre}}
        </option>

      }

    </select>


    <p-button
      label="Filtrar"
      (click)="cargarProyectos()">
    </p-button>

  </div>


  <p-table
    id="tabla"
    [value]="proyectos"
    [tableStyle]="{ 'min-width': '50rem' }"
    [scrollable]="true"
    scrollHeight="70vh"
  >


    <ng-template pTemplate="header">

      <tr>

        <th>ID</th>
        <th>Nombre</th>
        <th>Cliente</th>
        <th>Estado</th>
        <th>Inicio</th>
        <th>Fin</th>
        <th>Acciones</th>

      </tr>

    </ng-template>



    <ng-template pTemplate="body" let-proyecto>

      <tr>

        <td>
          {{proyecto.id}}
        </td>


        <td>
          {{ proyecto.nombre }}
        </td>


        <td>
          {{ proyecto.cliente?.nombre || 'Interno' }}
        </td>


        <td>
          {{ proyecto.estado }}
        </td>


        <td>
          {{proyecto.fechaInicio | date:'dd/MM/yyyy'}}
        </td>


        <td>
          {{proyecto.fechaFinObjetivo | date:'dd/MM/yyyy'}}
        </td>


        <td>


          <p-button
            icon="pi pi-list"
            pTooltip="Gestionar Tareas"
            (click)="gestionarTareas(proyecto)">
          </p-button>


          <p-button
            icon="pi pi-pencil"
            pTooltip="Editar Proyecto"
            (click)="editarProyecto(proyecto)">
          </p-button>


          <p-button
            icon="pi pi-eye"
            pTooltip="Ver detalle"
            [routerLink]="['/proyectos', proyecto.id]">
          </p-button>


        </td>


      </tr>


    </ng-template>



    <ng-template pTemplate="emptymessage">

      <tr>

        <td colspan="7">
          No se encontraron proyectos.
        </td>

      </tr>

    </ng-template>


  </p-table>


</app-template>


<app-gestion-proyecto
 [(visible)]="dialogVisible"
 [(proyectoSeleccionado)]="proyectoSeleccionado"
 (guardado)="cargarProyectos()">
</app-gestion-proyecto>
